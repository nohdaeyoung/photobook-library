<svg xmlns="http://www.w3.org/2000/svg" width="600" height="800" viewBox="0 0 600 800">
  <rect width="600" height="800" fill="#1a1a2e"/>

  <!-- 장식선 상단 -->
  <line x1="80" y1="80" x2="520" y2="80" stroke="#e94560" stroke-width="1" opacity="0.6"/>

  <!-- 장식선 하단 -->
  <line x1="80" y1="720" x2="520" y2="720" stroke="#e94560" stroke-width="1" opacity="0.6"/>

  <!-- 연도 -->
  <text x="300" y="140" text-anchor="middle" fill="#e94560" font-family="Georgia, serif" font-size="18" letter-spacing="6" opacity="0.8">1958</text>

  <!-- 장식 요소 -->
  <rect x="270" y="170" width="60" height="2" fill="#e94560" opacity="0.4"/>

  <!-- 타이틀 -->
  <g>
    <text x="300" y="360" text-anchor="middle" fill="#f0f0f0" font-family="Georgia, serif" font-size="42" font-weight="bold">The Americans</text>
  </g>

  <!-- 구분선 -->
  <rect x="240" y="432" width="120" height="1" fill="#e94560" opacity="0.5"/>

  <!-- 작가 -->
  <text x="300" y="477" text-anchor="middle" fill="#f0f0f0" font-family="Georgia, serif" font-size="20" opacity="0.7">Robert Frank</text>

  <!-- 하단 장식 -->
  <rect x="290" y="680" width="20" height="2" fill="#e94560" opacity="0.4"/>
</svg>